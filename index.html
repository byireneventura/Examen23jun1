<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supuesto Práctico 1</title>

<style>
body{
    background-color:#ffffff;@font-face{
    font-family: "miFuente";
    src: url("fuente2.ttf");
    }
}

.contenedor{
    width:80%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px lightgray;
}

h1{
    font-family: serif;
    font-size:48px;
    margin-bottom:40px;
}

.caja{
    border:1px solid lightgray;
    border-radius:12px;
    padding:20px;
    margin-bottom:25px;
}

h2{
    font-size:20px;
    margin-top:0;
}

.boton{
    width:70px;
    height:70px;
    background:#003cff;
    border:none;
    border-radius:10px;
}

.boton img{
    width:40px;
}

p{
    font-size:18px;
    line-height:1.6;
}
</style>

</head>
<body>

<div class="contenedor">

<h1>SUPUESTO PRÁCTICO 1</h1>

<div class="caja">
    <h2>1. BOTÓN DE GUARDAR</h2>
    <button class="boton">
    <img src="uno.png" alt="Guardar">
</button>
</div>

<div class="caja">
    <h2>2. BOTÓN DE GRABAR AUDIO</h2>
   <button class="boton">
    <img src="ocho.png" alt="Grabar audio">
</button>
</div>

<div class="caja">
    <h2>3. BOTÓN DE AYUDA</h2>
    <button class="boton">
    <img src="siete.png" alt="Ayuda">
</button>
</div>

<div class="caja">
    <h2>4. BOTÓN DE BUSCAR</h2>
    <button class="boton">
    <img src="tres.png" alt="Buscar">
</button>
</div>

<div class="caja">
    <h2>5. ENLACE DE DESCARGA</h2>

    <p>
        Para repasar antes del examen final, puedes bajarte los ejercicios resueltos.
    </p>

    <p>
        Descarga el
        <a href="IMG_0222.jpeg">
    calendario escolar (JPEG)
</a>
        de este año.
    </p>

</div>

</div>

</body>
</html>
